<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpGrad Event Management - Home</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <!-- Hero Section -->
    <div class="hero-section">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Welcome to UpGrad Event Management</h1>
            <p class="lead mb-4">Discover, register, and manage the best educational and industrial events seamlessly.</p>
            <a href="#upcoming-events" class="btn btn-light btn-lg px-4 rounded-pill">Explore Events</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mb-5" id="upcoming-events">
        <h2 class="text-center mb-4">Upcoming Events</h2>
        
        <!-- Events Grid -->
        <div class="row g-4" id="events-grid">
            <!-- Events will be populated here via JavaScript -->
            <div class="col-12 text-center" id="loading-spinner">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('dbReady', async () => {
            const eventsGrid = document.getElementById('events-grid');
            const loadingSpinner = document.getElementById('loading-spinner');
            
            try {
                const events = await db.getAllEvents();
                loadingSpinner.style.display = 'none';

                if (events.length === 0) {
                    eventsGrid.innerHTML = '<div class="col-12 text-center"><p class="text-muted">No upcoming events found.</p></div>';
                    return;
                }

                let html = '';
                events.forEach(evt => {
                    html += `
                        <div class="col-md-6 col-lg-4">
                            <div class="card event-card h-100">
                                <div class="card-header border-bottom-0 pb-0 pt-3">
                                    <span class="badge bg-primary mb-2">${evt.category}</span>
                                </div>
                                <div class="card-body">
                                    <h5 class="card-title">${evt.name}</h5>
                                    <p class="card-text text-muted mb-2">
                                        <small><strong>ID:</strong> ${evt.id}</small>
                                    </p>
                                    <p class="card-text mb-1">
                                        <strong>Date:</strong> ${evt.date}
                                    </p>
                                    <p class="card-text mb-3">
                                        <strong>Time:</strong> ${evt.time}
                                    </p>
                                    <a href="register.html?id=${evt.id}" class="btn btn-outline-primary w-100 mt-auto">Register</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
                eventsGrid.innerHTML = html;
            } catch (err) {
                console.error("Error loading events", err);
                loadingSpinner.style.display = 'none';
                eventsGrid.innerHTML = '<div class="col-12 text-center text-danger"><p>Failed to load events. Please try again later.</p></div>';
            }
        });
    </script>
</body>
</html>
